<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 116 52" fill="none" role="img" aria-label="tilt">
  <title>tilt</title>
  <!--
    tilt mark. Two t letterforms flank the i and l, which are rebuilt as
    forward-leaning amber stripes (Adidas three-stripe motif). Every shape
    is a primitive rect/polygon — no font dependency, ships everywhere.
  -->

  <!-- t #1 -->
  <rect x="6"  y="10" width="4"  height="32" fill="#f5f6f7"/>
  <rect x="0"  y="18" width="16" height="4"  fill="#f5f6f7"/>

  <!-- i-stripe (shorter, slope 0.5 — top is 9px to the left of bottom) -->
  <polygon points="40,42 46,42 37,24 31,24" fill="#e8b84a"/>

  <!-- l-stripe (taller, same slope — top is 19px to the left of bottom) -->
  <polygon points="78,42 86,42 67,4  59,4"  fill="#e8b84a"/>

  <!-- t #2 -->
  <rect x="94" y="10" width="4"  height="32" fill="#f5f6f7"/>
  <rect x="88" y="18" width="16" height="4"  fill="#f5f6f7"/>
</svg>
