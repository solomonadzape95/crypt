<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none" role="img" aria-label="tilt — parametric SLA escrow on Stellar">
  <title>tilt</title>

  <!-- operator-console plate -->
  <rect width="1200" height="320" fill="#1a1c22"/>
  <!-- amber beacon hairline, top-left -->
  <rect x="0" y="0"   width="120"  height="2" fill="#e8b84a"/>
  <!-- bottom rule -->
  <rect x="0" y="318" width="1200" height="2" fill="#3a3f4a"/>

  <!-- LOGO: scaled-up copy of /brand/logo.svg primitives, anchored left -->
  <g transform="translate(80, 100) scale(2.4)">
    <rect x="6"  y="10" width="4"  height="32" fill="#f5f6f7"/>
    <rect x="0"  y="18" width="16" height="4"  fill="#f5f6f7"/>
    <polygon points="40,42 46,42 37,24 31,24" fill="#e8b84a"/>
    <polygon points="78,42 86,42 67,4  59,4"  fill="#e8b84a"/>
    <rect x="94" y="10" width="4"  height="32" fill="#f5f6f7"/>
    <rect x="88" y="18" width="16" height="4"  fill="#f5f6f7"/>
  </g>

  <!-- vertical divider between logo and wordmark -->
  <rect x="420" y="110" width="2" height="100" fill="#3a3f4a"/>

  <!-- WORDMARK + tagline. JetBrains Mono with a generic monospace fallback so
       this still reads if the font isn't loaded by the consuming surface. -->
  <text x="460" y="200"
        font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace"
        font-size="128" font-weight="700" fill="#f5f6f7" letter-spacing="-5">tilt</text>
  <text x="462" y="245"
        font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace"
        font-size="20" font-weight="400" fill="#a8aeb4" letter-spacing="4">PARAMETRIC SLA ESCROW · STELLAR</text>
</svg>
